name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  STABLE_TAG: v2.5

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout stable version
        uses: actions/checkout@v4
        with:
          ref: ${{ env.STABLE_TAG }}
          path: stable

      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          path: latest-source

      - name: Build Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/latest
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude 'README.md' \
            --exclude 'AGENTS.md' \
            --exclude 'CLAUDE.md' \
            --exclude 'tests' \
            --exclude 'package.json' \
            stable/ site/
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude 'README.md' \
            --exclude 'AGENTS.md' \
            --exclude 'CLAUDE.md' \
            --exclude 'tests' \
            --exclude 'package.json' \
            latest-source/ site/latest/
          # Єдине джерело версії: підставляємо тег деплою в напис на стабільному корені.
          # (/latest/ показує 'latest' за шляхом, тож його не чіпаємо.)
          sed -i "s/const STABLE_VERSION = '[^']*'/const STABLE_VERSION = '${STABLE_TAG#v}'/" site/js/main.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
